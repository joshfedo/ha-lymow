delete_zone:
  name: Delete zone
  description: >
    Delete a mowing zone from the robot’s map using USER_CTRL_CLEAR_ZONE.
    Only go-zones can be targeted; child no-go zones are removed server-side.
  fields:
    zone_hash_id:
      name: Zone hash ID
      description: >
        The 8-character hash ID of the go-zone to delete.
      required: true
      example: "wsmjco1T"
      selector:
        text:

delete_channel:
  name: Delete channel
  description: >
    Delete a channel (the path connector between two zones) from the robot's
    map using USER_CTRL_DELETE_CHANNEL.
  fields:
    channel_hash_id:
      name: Channel hash ID
      description: >
        The hash ID of the channel to delete (see the map sensor's channels
        attribute).
      required: true
      example: "ch3Kp9aQ"
      selector:
        text:

delete_nogo_zone:
  name: Delete no-go zone
  description: >
    Delete a no-go zone from the robot's map by hash ID (USER_CTRL_CLEAR_ZONE).
    Tip: back up the map first (deleting a go-zone also removes its child no-go
    zones) so you can restore from that backup if you need them back.
  fields:
    nogo_hash_id:
      name: No-go zone hash ID
      description: The hash ID of the no-go zone to delete (see the map sensor's nogo_zones).
      required: true
      example: "f518RwgE"
      selector:
        text:

start_zone:
  name: Start zone mow
  description: >
    Start mowing one or more specific zones by hash ID.
    The robot will mow only the listed zones instead of all zones.
  fields:
    zone_hash_ids:
      name: Zone hash IDs
      description: >
        List of 8-character hash IDs of the go-zones to mow.
      required: true
      example: ["wsmjco1T", "KX1kGyat"]
      selector:
        object:

pause:
  name: Pause mowing
  description: >
    Pause the robot. Sends USER_CTRL_PAUSE during a mow or USER_CTRL_PAUSE_DOCK
    while it is returning to the dock. Provided in addition to lawn_mower.pause
    so card automations (e.g. RTK auto-pause) can stay in the lymow domain.
  target:
    entity:
      integration: lymow
      domain: lawn_mower

query_map:
  name: Refresh map
  description: >
    Request a fresh map and zone list from the robot (USER_CTRL_QUERY_MAP=19).
    Useful when zone entities are stale or not yet populated.

query_schedules:
  name: Query schedules
  description: >
    Request schedule data from the robot (USER_CTRL_QUERY_SCHEDULES=20).
    Currently returns an empty result if no schedules are configured in the app.

start_video_session:
  name: Start video session
  description: >
    Request a Kinesis Video Streams WebRTC session for the robot's camera.
    Returns the channelARN, temporary AWS credentials, and region. Credentials
    expire in ~15 minutes. The integration itself does not stream video bytes —
    you need an external WebRTC viewer (go2rtc, aiortc, etc.) to consume the
    response and complete the handshake.

ble_drive:
  name: Manual drive (BLE)
  description: >
    Send a local Bluetooth manual-drive command to the robot. Streams the
    joystick frame for the given duration, then stops. Velocities are clamped
    to the safe range and the duration is capped at 5 s. The robot's BLE
    address is auto-discovered by name when in range; you can also set it
    explicitly in the integration options.
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    linear:
      name: Linear velocity
      description: Forward (+) / backward (-) speed in m/s.
      required: true
      example: 0.3
      selector:
        number:
          min: -0.5
          max: 0.5
          step: 0.05
          unit_of_measurement: m/s
    angular:
      name: Angular velocity
      description: Right (+) / left (-) turn rate in rad/s.
      required: true
      example: 0.0
      selector:
        number:
          min: -0.6
          max: 0.6
          step: 0.05
          unit_of_measurement: rad/s
    duration:
      name: Duration
      description: How long to drive before stopping, in seconds (max 5).
      required: false
      default: 1.0
      example: 1.0
      selector:
        number:
          min: 0.0
          max: 5.0
          step: 0.5
          unit_of_measurement: s

restore_backup_map:
  name: Restore backup map
  description: >
    Restore a previously saved backup map onto the robot (restore-map-v2),
    then re-query the active map. The object key comes from the backup-maps
    sensor's attribute list.
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    object_key:
      name: Object key
      description: >
        S3 object key of the backup map — the `file` value from the Backup
        maps sensor's `backups` attribute.
      required: true
      example: "device_xxxx/map/map_20260514T142312Z.pb"
      selector:
        text:

delete_backup_map:
  name: Delete backup map
  description: Delete a saved backup map (delete-backup-map).
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    object_key:
      name: Object key
      description: S3 object key (the `file` value from the Backup maps sensor) to delete.
      required: true
      example: "device_xxxx/map/map_20260514T142312Z.pb"
      selector:
        text:

rename_backup_map:
  name: Rename backup map
  description: Set the display name of a saved backup map (update-backup-map-metadata).
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    object_key:
      name: Object key
      description: S3 object key (the `file` value from the Backup maps sensor) to rename.
      required: true
      example: "device_xxxx/map/map_20260514T142312Z.pb"
      selector:
        text:
    name:
      name: Name
      description: New display name for the backup map.
      required: true
      example: "Spring layout"
      selector:
        text:

set_device_name:
  name: Set device name
  description: Set the robot's cloud display name (device-update).
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    name:
      name: Name
      description: New display name for the robot.
      required: true
      example: "Garden Bot"
      selector:
        text:

set_task_config:
  name: Set task config
  description: >
    Set mowing task parameters on the robot (USER_CTRL_SET_TASK_CONFIG).
    Only the parameters you provide are sent. Values are passed through to the
    robot as-is — valid ranges aren't fully characterised, so change one at a
    time and observe. Wire layout derived from the app.
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    path_spacing:
      name: Path spacing
      description: Spacing between mowing passes (robot units).
      example: 200
      selector:
        number: { min: 0, max: 1000, step: 1, mode: box }
    perimeter_mow_laps:
      name: Perimeter laps
      description: Number of perimeter (edge) mowing laps.
      example: 1
      selector:
        number: { min: 0, max: 5, step: 1, mode: box }
    perimeter_mow_dir:
      name: Perimeter direction
      description: Perimeter mowing direction code.
      example: 0
      selector:
        number: { min: 0, max: 3, step: 1, mode: box }
    nogo_mow_laps:
      name: No-go laps
      description: Number of laps around no-go zones.
      example: 1
      selector:
        number: { min: 0, max: 5, step: 1, mode: box }
    cut_speed:
      name: Cut speed
      description: Cutting speed (robot units).
      example: 100
      selector:
        number: { min: 0, max: 1000, step: 1, mode: box }
    brush_speed:
      name: Brush speed
      description: Brush/blade speed (robot units).
      example: 100
      selector:
        number: { min: 0, max: 1000, step: 1, mode: box }
    move_speed:
      name: Move speed
      description: Drive speed (m/s).
      example: 0.6
      selector:
        number: { min: 0.1, max: 1.0, step: 0.05, mode: box }
    obs_dec_mode:
      name: Obstacle avoidance mode
      description: 0 = off, 1 = slow down, 2 = detour. (Coerced to int by the service schema.)
      example: "1"
      selector:
        select:
          options:
            - { value: "0", label: "Off" }
            - { value: "1", label: "Slow down" }
            - { value: "2", label: "Detour" }
    clean_mode:
      name: Clean mode
      description: Mowing pattern (robot-specific enum).
      example: 0
      selector:
        number: { min: 0, max: 10, step: 1, mode: box }
    path_order:
      name: Path order
      description: Toggle path-ordering strategy (bool).
      example: false
      selector:
        boolean:
    line_follow_mode:
      name: Line-follow mode
      description: Enable straight-line following (bool).
      example: false
      selector:
        boolean:
    raise_cut_height:
      name: Raise cut height
      description: One-shot raise the cutting deck by one notch (bool).
      example: true
      selector:
        boolean:
    lower_cut_height:
      name: Lower cut height
      description: One-shot lower the cutting deck by one notch (bool).
      example: true
      selector:
        boolean:

set_device_settings:
  name: Set Device Settings
  description: >
    Write the four "Device Settings" options the app exposes (PbTaskConfig
    submessage) — two selects (Return-to-Dock route, Zone order) and two
    toggles (Rainy Mowing, Charging Handbrake). Only the parameters you
    provide are sent. Mirrors the app's Settings → Device Settings page.
    Each option is a persistent device setting — distinct from the
    per-zone cut height / path spacing parameters exposed by the
    existing lymow.set_task_config.
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    charging_mode:
      name: Return to Dock route
      description: >
        follow_perimeter = mower returns to dock along the recorded perimeter
        (safer, slower); direct_route = straight line back (faster).
      example: "follow_perimeter"
      selector:
        select:
          options:
            - "follow_perimeter"
            - "direct_route"
    zone_order:
      name: Zone order
      description: >
        optimize = app picks the best zone sequence; custom = use the order
        you defined in the app.
      example: "optimize"
      selector:
        select:
          options:
            - "optimize"
            - "custom"
    rainy_mowing:
      name: Rainy Mowing
      description: Continue mowing if the rain sensor triggers (instead of returning to dock).
      example: false
      selector:
        boolean:
    charging_handbrake:
      name: Charging Handbrake
      description: >
        Recommended for uneven ground — prevents the mower from sliding off
        the dock. UI sense (on = handbrake engaged); the wire field
        (disableChargingPark) is inverted under the hood.
      example: true
      selector:
        boolean:

set_recharge_resume:
  name: Set Recharge & Resume
  description: >
    Configure the mower's Recharge & Resume schedule and battery thresholds
    (PbRobotConfig.rrConfig). Mirrors the app's Device Settings → Recharge &
    Resume page. Only the parameters you provide are sent; the others stay
    untouched on the robot. enable=true with a period_start/period_end window
    means the mower can resume mowing during that window after a recharge.
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    enable:
      name: Enable
      description: Master on/off for Recharge & Resume.
      example: true
      selector:
        boolean:
    period_start:
      name: Resume window start (HH:MM)
      description: Earliest time of day the mower may resume mowing after a recharge.
      example: "09:00"
      selector:
        text:
    period_end:
      name: Resume window end (HH:MM)
      description: Latest time of day the mower may resume mowing.
      example: "18:00"
      selector:
        text:
    recharge_bat:
      name: Recharge battery threshold (%)
      description: Battery level at which the mower returns to the dock to recharge.
      example: 20
      selector:
        number: { min: 0, max: 100, step: 1, unit_of_measurement: "%", mode: box }
    resume_bat:
      name: Resume battery threshold (%)
      description: Battery level at which the mower resumes mowing after charging.
      example: 80
      selector:
        number: { min: 0, max: 100, step: 1, unit_of_measurement: "%", mode: box }

set_night_mode:
  name: Set headlight schedule (Night Mode)
  description: >
    Configure the camera headlight schedule window. Mirrors the app's
    Settings → Headlight page (called "Night Mode" in the wire format /
    APK). When enable=false, the schedule is still recorded but a
    one-shot SIGNAL_TURN_OFF_CAMERA_LIGHT is co-published so the light
    turns off immediately too — matching what the app does on disable.
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    open_time:
      name: Light-on time (HH:MM)
      description: Time of day the headlight schedule starts (24h).
      example: "21:00"
      required: true
      selector:
        text:
    close_time:
      name: Light-off time (HH:MM)
      description: Time of day the headlight schedule ends.
      example: "06:00"
      required: true
      selector:
        text:
    enable:
      name: Enable schedule
      description: >
        True keeps the schedule running. False records the same schedule
        but also forces the light off right now via a co-published
        SIGNAL_TURN_OFF_CAMERA_LIGHT.
      example: true
      required: true
      selector:
        boolean:

set_network_priority:
  name: Set network priority
  description: >
    Choose whether the mower should prefer cellular (4G) or Wi-Fi when both
    are available. Maps to PbRobotConfig.metric_4g (true = 4G preferred,
    false = Wi-Fi preferred) — the same option as the app's
    Network Settings → Network Priority screen.
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    preferred:
      name: Preferred network
      description: "4g = always use cellular when available; wifi = prefer Wi-Fi, fall back to 4G if it drops."
      required: true
      example: "wifi"
      selector:
        select:
          options:
            - "4g"
            - "wifi"

set_run_time_config:
  name: Set run-time config
  description: >
    Override run-time mow parameters on the currently-running task
    (USER_CTRL_SET_RUN_TIME_CONFIG). Unlike set_task_config (which is the
    next-mow default), this changes settings live. Only the parameters you
    provide are sent. Wire layout derived from the app.
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    cut_height:
      name: Cut height (mm)
      description: Blade height in millimetres.
      example: 40
      selector:
        number: { min: 20, max: 100, step: 1, unit_of_measurement: mm, mode: box }
    move_speed:
      name: Move speed (m/s)
      description: Forward movement speed in metres per second.
      example: 0.6
      selector:
        number: { min: 0.1, max: 1.5, step: 0.05, unit_of_measurement: "m/s", mode: box }
    cut_speed:
      name: Cut speed
      description: Blade speed (robot units).
      example: 100
      selector:
        number: { min: 0, max: 1000, step: 1, mode: box }

rename_zone:
  name: Rename zone
  description: >
    Rename a go-zone on the robot's map (USER_CTRL_MODIFY_ZONE_INFO).
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    zone_hash_id:
      name: Zone hash ID
      description: The 8-character hash ID of the go-zone to rename.
      required: true
      example: "wsmjco1T"
      selector:
        text:
    name:
      name: New name
      description: The new zone name.
      required: true
      example: "Front lawn"
      selector:
        text:

clear_schedules:
  name: Clear schedules
  description: >
    Remove all mowing schedules from the robot (sends an empty schedule list).
  target:
    entity:
      integration: lymow
      domain: lawn_mower

set_schedules:
  name: Set schedules
  description: >
    Write the robot's full mowing schedule list. Replaces all existing
    schedules. Each entry runs at the given time; the robot mows autonomously
    when a schedule fires.
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    schedules:
      name: Schedules
      description: >
        List of schedule entries. Each entry needs hour and minute, and may set
        day_of_week (0-6 Sun-Sat, or names), zones (list of zone hash IDs to
        mow), repeated (default true), and disabled (default false).
      required: true
      example: |
        - hour: 9
          minute: 30
          day_of_week: [mon, wed, fri]
          zones: ["wsmjco1T"]
      selector:
        object:

update_zone_polygon:
  name: Update zone polygon
  description: >
    Replace a go-zone's outline with a new polygon (USER_CTRL_SYNC_MAP). Points
    are in the robot's local ENU frame (metres). Used by the map card's editor.
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    zone_hash_id:
      name: Zone hash ID
      description: The 8-character hash ID of the go-zone to reshape.
      required: true
      example: "wsmjco1T"
      selector:
        text:
    polygon:
      name: Polygon
      description: >
        Ordered list of at least 3 vertices, each an {x, y} point in metres
        (local ENU frame).
      required: true
      example: [{ x: 0.0, y: 0.0 }, { x: 5.0, y: 0.0 }, { x: 5.0, y: 4.0 }]
      selector:
        object:

add_zone:
  name: Add zone
  description: >
    Create a new go-zone from a polygon and push it to the robot's map
    (USER_CTRL_SYNC_MAP). Points are in the robot's local ENU frame (metres).
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    polygon:
      name: Polygon
      description: Ordered list of at least 3 {x, y} vertices in metres (local ENU frame).
      required: true
      example: [{ x: 0.0, y: 0.0 }, { x: 5.0, y: 0.0 }, { x: 5.0, y: 4.0 }]
      selector:
        object:
    name:
      name: Name
      description: Optional display name for the new zone.
      required: false
      example: "Side strip"
      selector:
        text:
    cut_height_mm:
      name: Cut height
      description: Cutting height for the zone, in millimetres.
      required: false
      default: 40
      example: 40
      selector:
        number: { min: 20, max: 100, step: 1, unit_of_measurement: mm, mode: box }

merge_zones:
  name: Merge zones
  description: >
    Merge two or more adjacent go-zones into one (USER_CTRL_MERGE_ZONE).
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    zone_hash_ids:
      name: Zone hash IDs
      description: List of at least two go-zone hash IDs to merge.
      required: true
      example: ["wsmjco1T", "KX1kGyat"]
      selector:
        object:
    name:
      name: Name
      description: Optional display name for the merged zone.
      required: false
      example: "Whole lawn"
      selector:
        text:
    cut_height_mm:
      name: Cut height
      description: Optional cutting height for the merged zone, in millimetres.
      required: false
      example: 40
      selector:
        number: { min: 20, max: 100, step: 1, unit_of_measurement: mm, mode: box }

split_zone:
  name: Split zone
  description: >
    Split a go-zone into two along the line between two points
    (USER_CTRL_CUT_ZONE). Points are in the robot's local ENU frame (metres).
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    zone_hash_id:
      name: Zone hash ID
      description: The hash ID of the go-zone to split.
      required: true
      example: "wsmjco1T"
      selector:
        text:
    cut_p1:
      name: Cut line point 1
      description: First endpoint of the split line, as {x, y} in metres.
      required: true
      example: { x: 2.5, y: 0.0 }
      selector:
        object:
    cut_p2:
      name: Cut line point 2
      description: Second endpoint of the split line, as {x, y} in metres.
      required: true
      example: { x: 2.5, y: 4.0 }
      selector:
        object:
    names:
      name: Names
      description: Optional two display names for the resulting zones.
      required: false
      example: ["Left", "Right"]
      selector:
        object:

pin_and_go:
  name: Pin and go
  description: >
    Drop a temporary spot-mow zone of the given radius around a map point and
    start mowing it. Coordinates are in the robot's local ENU frame (metres).
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    x:
      name: X
      description: X coordinate of the point in metres (local ENU frame).
      required: true
      example: 3.5
      selector:
        number: { min: -1000, max: 1000, step: 0.1, mode: box }
    y:
      name: Y
      description: Y coordinate of the point in metres (local ENU frame).
      required: true
      example: -2.0
      selector:
        number: { min: -1000, max: 1000, step: 0.1, mode: box }
    radius_m:
      name: Radius
      description: Radius of the spot-mow circle, in metres.
      required: false
      default: 1.0
      example: 1.0
      selector:
        number: { min: 0.1, max: 20.0, step: 0.1, unit_of_measurement: m, mode: box }
    cut_height_mm:
      name: Cut height
      description: Cutting height for the spot zone, in millimetres.
      required: false
      default: 40
      example: 40
      selector:
        number: { min: 20, max: 100, step: 1, unit_of_measurement: mm, mode: box }
    name:
      name: Name
      description: Optional display name for the spot zone.
      required: false
      example: "Spot"
      selector:
        text:

resume:
  name: Resume mowing
  description: >
    Resume a paused or in-flight mow without restarting it. HA's standard
    "start mowing" service starts a fresh task (USER_CTRL_CLEAN); this sends
    USER_CTRL_RESUME so the robot picks up from where it was — useful after a
    pause or after telling it to dock mid-mow.
  target:
    entity:
      integration: lymow
      domain: lawn_mower

query_cleaning_info:
  name: Query current cleaning info
  description: >
    Request the robot's per-session cleaning info (USER_CTRL_QUERY_CLEANING_INFO=24).
    The reply populates the live PbCleanInfo sensors (Mow time remaining, Total
    map area, etc.). Fire-and-forget — values arrive via the next pboutput.
  target:
    entity:
      integration: lymow
      domain: lawn_mower

query_cleaning_summary:
  name: Query last cleaning summary
  description: >
    Request the last session's summary (USER_CTRL_QUERY_CLEANING_SUMMARY=34).
    Populates sensor.last_mow_session (start time, end-type, battery used,
    per-status time breakdown).
  target:
    entity:
      integration: lymow
      domain: lawn_mower

query_robot_config:
  name: Query robot configuration
  description: >
    Request a full PbRobotConfig readback (USER_CTRL_QUERY_ROBOT_CONFIG=35).
    Refreshes the cached robotConfig dict (audio volume, LED state,
    Recharge & Resume thresholds, etc.).
  target:
    entity:
      integration: lymow
      domain: lawn_mower

query_path:
  name: Query historical path
  description: >
    Request the robot's historical mowing path (USER_CTRL_QUERY_PATH=23).
    Decode not yet implemented — payload is logged for future analysis.
  target:
    entity:
      integration: lymow
      domain: lawn_mower

query_channels:
  name: Query channels
  description: >
    Request the channel (corridor between zones) list (USER_CTRL_QUERY_CHANNELS=39).
    Refreshes mapData.channels with the current channel polygons.
  target:
    entity:
      integration: lymow
      domain: lawn_mower

query_run_time_config:
  name: Query live runtime config
  description: >
    Request the live PbRunTimeConfig (USER_CTRL_QUERY_RUN_TIME_CONFIG=51) —
    the in-flight cut height / move speed / cut speed overrides. Reply decode
    is not yet implemented; this is a fire-and-forget probe.
  target:
    entity:
      integration: lymow
      domain: lawn_mower

query_wifi_4g:
  name: Query Wi-Fi / 4G status
  description: >
    Request the Wi-Fi / 4G status (USER_CTRL_QUERY_WIFI_4G=52). Reply decode
    is not yet implemented (SSID / SIM data needs PII redaction first).
  target:
    entity:
      integration: lymow
      domain: lawn_mower

query_net_detail:
  name: Query network details
  description: >
    Request detailed network info (USER_CTRL_QUERY_NET_DETAIL=53). Reply decode
    is not yet implemented; see query_wifi_4g notes.
  target:
    entity:
      integration: lymow
      domain: lawn_mower

query_rtk_diagnostic_l1:
  name: Query RTK diagnostic L1
  description: >
    Request RTK level-1 diagnostic (USER_CTRL_QUERY_RTK_DIAGNOSTIC_L1=57).
