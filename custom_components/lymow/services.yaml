delete_zone:
  name: Delete zone
  description: >
    Delete a mowing zone from the robot’s map using USER_CTRL_CLEAR_ZONE.
    Only go-zones can be targeted; child no-go zones are removed server-side.
  fields:
    zone_hash_id:
      name: Zone hash ID
      description: >
        The 8-character hash ID of the go-zone to delete.
      required: true
      example: "wsmjco1T"
      selector:
        text:

delete_channel:
  name: Delete channel
  description: >
    Delete a channel (the path connector between two zones) from the robot's
    map using USER_CTRL_DELETE_CHANNEL.
  fields:
    channel_hash_id:
      name: Channel hash ID
      description: >
        The hash ID of the channel to delete (see the map sensor's channels
        attribute).
      required: true
      example: "ch3Kp9aQ"
      selector:
        text:

delete_nogo_zone:
  name: Delete no-go zone
  description: >
    Delete a no-go zone from the robot's map by hash ID (USER_CTRL_CLEAR_ZONE).
    Tip: back up the map first (deleting a go-zone also removes its child no-go
    zones) so you can restore from that backup if you need them back.
  fields:
    nogo_hash_id:
      name: No-go zone hash ID
      description: The hash ID of the no-go zone to delete (see the map sensor's nogo_zones).
      required: true
      example: "f518RwgE"
      selector:
        text:

start_zone:
  name: Start zone mow
  description: >
    Start mowing one or more specific zones by hash ID.
    The robot will mow only the listed zones instead of all zones.
  fields:
    zone_hash_ids:
      name: Zone hash IDs
      description: >
        List of 8-character hash IDs of the go-zones to mow.
      required: true
      example: ["wsmjco1T", "KX1kGyat"]
      selector:
        object:

query_map:
  name: Refresh map
  description: >
    Request a fresh map and zone list from the robot (USER_CTRL_QUERY_MAP=19).
    Useful when zone entities are stale or not yet populated.

query_schedules:
  name: Query schedules
  description: >
    Request schedule data from the robot (USER_CTRL_QUERY_SCHEDULES=20).
    Currently returns an empty result if no schedules are configured in the app.

start_video_session:
  name: Start video session
  description: >
    Request a Kinesis Video Streams WebRTC session for the robot's camera.
    Returns the channelARN, temporary AWS credentials, and region. Credentials
    expire in ~15 minutes. The integration itself does not stream video bytes —
    you need an external WebRTC viewer (go2rtc, aiortc, etc.) to consume the
    response and complete the handshake.

ble_drive:
  name: Manual drive (BLE)
  description: >
    Send a local Bluetooth manual-drive command to the robot. Streams the
    joystick frame for the given duration, then stops. Velocities are clamped
    to the safe range and the duration is capped at 5 s. The robot's BLE
    address is auto-discovered by name when in range; you can also set it
    explicitly in the integration options.
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    linear:
      name: Linear velocity
      description: Forward (+) / backward (-) speed in m/s.
      required: true
      example: 0.3
      selector:
        number:
          min: -0.5
          max: 0.5
          step: 0.05
          unit_of_measurement: m/s
    angular:
      name: Angular velocity
      description: Right (+) / left (-) turn rate in rad/s.
      required: true
      example: 0.0
      selector:
        number:
          min: -0.6
          max: 0.6
          step: 0.05
          unit_of_measurement: rad/s
    duration:
      name: Duration
      description: How long to drive before stopping, in seconds (max 5).
      required: false
      default: 1.0
      example: 1.0
      selector:
        number:
          min: 0.0
          max: 5.0
          step: 0.5
          unit_of_measurement: s

restore_backup_map:
  name: Restore backup map
  description: >
    Restore a previously saved backup map onto the robot (restore-map-v2),
    then re-query the active map. The object key comes from the backup-maps
    sensor's attribute list.
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    object_key:
      name: Object key
      description: >
        S3 object key of the backup map — the `file` value from the Backup
        maps sensor's `backups` attribute.
      required: true
      example: "device_xxxx/map/map_20260514T142312Z.pb"
      selector:
        text:

delete_backup_map:
  name: Delete backup map
  description: Delete a saved backup map (delete-backup-map).
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    object_key:
      name: Object key
      description: S3 object key (the `file` value from the Backup maps sensor) to delete.
      required: true
      example: "device_xxxx/map/map_20260514T142312Z.pb"
      selector:
        text:

rename_backup_map:
  name: Rename backup map
  description: Set the display name of a saved backup map (update-backup-map-metadata).
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    object_key:
      name: Object key
      description: S3 object key (the `file` value from the Backup maps sensor) to rename.
      required: true
      example: "device_xxxx/map/map_20260514T142312Z.pb"
      selector:
        text:
    name:
      name: Name
      description: New display name for the backup map.
      required: true
      example: "Spring layout"
      selector:
        text:

set_device_name:
  name: Set device name
  description: Set the robot's cloud display name (device-update).
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    name:
      name: Name
      description: New display name for the robot.
      required: true
      example: "Garden Bot"
      selector:
        text:

set_task_config:
  name: Set task config
  description: >
    Set mowing task parameters on the robot (USER_CTRL_SET_TASK_CONFIG).
    Only the parameters you provide are sent. Values are passed through to the
    robot as-is — valid ranges aren't fully characterised, so change one at a
    time and observe. Wire layout derived from the app.
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    path_spacing:
      name: Path spacing
      description: Spacing between mowing passes (robot units).
      example: 200
      selector:
        number: { min: 0, max: 1000, step: 1, mode: box }
    perimeter_mow_laps:
      name: Perimeter laps
      description: Number of perimeter (edge) mowing laps.
      example: 1
      selector:
        number: { min: 0, max: 5, step: 1, mode: box }
    perimeter_mow_dir:
      name: Perimeter direction
      description: Perimeter mowing direction code.
      example: 0
      selector:
        number: { min: 0, max: 3, step: 1, mode: box }
    nogo_mow_laps:
      name: No-go laps
      description: Number of laps around no-go zones.
      example: 1
      selector:
        number: { min: 0, max: 5, step: 1, mode: box }
    cut_speed:
      name: Cut speed
      description: Cutting speed (robot units).
      example: 100
      selector:
        number: { min: 0, max: 1000, step: 1, mode: box }
    brush_speed:
      name: Brush speed
      description: Brush/blade speed (robot units).
      example: 100
      selector:
        number: { min: 0, max: 1000, step: 1, mode: box }

rename_zone:
  name: Rename zone
  description: >
    Rename a go-zone on the robot's map (USER_CTRL_MODIFY_ZONE_INFO).
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    zone_hash_id:
      name: Zone hash ID
      description: The 8-character hash ID of the go-zone to rename.
      required: true
      example: "wsmjco1T"
      selector:
        text:
    name:
      name: New name
      description: The new zone name.
      required: true
      example: "Front lawn"
      selector:
        text:

clear_schedules:
  name: Clear schedules
  description: >
    Remove all mowing schedules from the robot (sends an empty schedule list).
  target:
    entity:
      integration: lymow
      domain: lawn_mower

set_schedules:
  name: Set schedules
  description: >
    Write the robot's full mowing schedule list. Replaces all existing
    schedules. Each entry runs at the given time; the robot mows autonomously
    when a schedule fires.
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    schedules:
      name: Schedules
      description: >
        List of schedule entries. Each entry needs hour and minute, and may set
        day_of_week (0-6 Sun-Sat, or names), zones (list of zone hash IDs to
        mow), repeated (default true), and disabled (default false).
      required: true
      example: |
        - hour: 9
          minute: 30
          day_of_week: [mon, wed, fri]
          zones: ["wsmjco1T"]
      selector:
        object:

update_zone_polygon:
  name: Update zone polygon
  description: >
    Replace a go-zone's outline with a new polygon (USER_CTRL_SYNC_MAP). Points
    are in the robot's local ENU frame (metres). Used by the map card's editor.
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    zone_hash_id:
      name: Zone hash ID
      description: The 8-character hash ID of the go-zone to reshape.
      required: true
      example: "wsmjco1T"
      selector:
        text:
    polygon:
      name: Polygon
      description: >
        Ordered list of at least 3 vertices, each an {x, y} point in metres
        (local ENU frame).
      required: true
      example: [{ x: 0.0, y: 0.0 }, { x: 5.0, y: 0.0 }, { x: 5.0, y: 4.0 }]
      selector:
        object:

add_zone:
  name: Add zone
  description: >
    Create a new go-zone from a polygon and push it to the robot's map
    (USER_CTRL_SYNC_MAP). Points are in the robot's local ENU frame (metres).
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    polygon:
      name: Polygon
      description: Ordered list of at least 3 {x, y} vertices in metres (local ENU frame).
      required: true
      example: [{ x: 0.0, y: 0.0 }, { x: 5.0, y: 0.0 }, { x: 5.0, y: 4.0 }]
      selector:
        object:
    name:
      name: Name
      description: Optional display name for the new zone.
      required: false
      example: "Side strip"
      selector:
        text:
    cut_height_mm:
      name: Cut height
      description: Cutting height for the zone, in millimetres.
      required: false
      default: 40
      example: 40
      selector:
        number: { min: 20, max: 100, step: 1, unit_of_measurement: mm, mode: box }

merge_zones:
  name: Merge zones
  description: >
    Merge two or more adjacent go-zones into one (USER_CTRL_MERGE_ZONE).
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    zone_hash_ids:
      name: Zone hash IDs
      description: List of at least two go-zone hash IDs to merge.
      required: true
      example: ["wsmjco1T", "KX1kGyat"]
      selector:
        object:
    name:
      name: Name
      description: Optional display name for the merged zone.
      required: false
      example: "Whole lawn"
      selector:
        text:
    cut_height_mm:
      name: Cut height
      description: Optional cutting height for the merged zone, in millimetres.
      required: false
      example: 40
      selector:
        number: { min: 20, max: 100, step: 1, unit_of_measurement: mm, mode: box }

split_zone:
  name: Split zone
  description: >
    Split a go-zone into two along the line between two points
    (USER_CTRL_CUT_ZONE). Points are in the robot's local ENU frame (metres).
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    zone_hash_id:
      name: Zone hash ID
      description: The hash ID of the go-zone to split.
      required: true
      example: "wsmjco1T"
      selector:
        text:
    cut_p1:
      name: Cut line point 1
      description: First endpoint of the split line, as {x, y} in metres.
      required: true
      example: { x: 2.5, y: 0.0 }
      selector:
        object:
    cut_p2:
      name: Cut line point 2
      description: Second endpoint of the split line, as {x, y} in metres.
      required: true
      example: { x: 2.5, y: 4.0 }
      selector:
        object:
    names:
      name: Names
      description: Optional two display names for the resulting zones.
      required: false
      example: ["Left", "Right"]
      selector:
        object:

pin_and_go:
  name: Pin and go
  description: >
    Drop a temporary spot-mow zone of the given radius around a map point and
    start mowing it. Coordinates are in the robot's local ENU frame (metres).
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    x:
      name: X
      description: X coordinate of the point in metres (local ENU frame).
      required: true
      example: 3.5
      selector:
        number: { min: -1000, max: 1000, step: 0.1, mode: box }
    y:
      name: Y
      description: Y coordinate of the point in metres (local ENU frame).
      required: true
      example: -2.0
      selector:
        number: { min: -1000, max: 1000, step: 0.1, mode: box }
    radius_m:
      name: Radius
      description: Radius of the spot-mow circle, in metres.
      required: false
      default: 1.0
      example: 1.0
      selector:
        number: { min: 0.1, max: 20.0, step: 0.1, unit_of_measurement: m, mode: box }
    cut_height_mm:
      name: Cut height
      description: Cutting height for the spot zone, in millimetres.
      required: false
      default: 40
      example: 40
      selector:
        number: { min: 20, max: 100, step: 1, unit_of_measurement: mm, mode: box }
    name:
      name: Name
      description: Optional display name for the spot zone.
      required: false
      example: "Spot"
      selector:
        text:

resume:
  name: Resume mowing
  description: >
    Resume a paused or in-flight mow without restarting it. HA's standard
    "start mowing" service starts a fresh task (USER_CTRL_CLEAN); this sends
    USER_CTRL_RESUME so the robot picks up from where it was — useful after a
    pause or after telling it to dock mid-mow.
  target:
    entity:
      integration: lymow
      domain: lawn_mower
