delete_zone:
  name: Delete zone
  description: >
    Delete a mowing zone from the robot’s map using USER_CTRL_CLEAR_ZONE.
    Only go-zones can be targeted; child no-go zones are removed server-side.
  fields:
    zone_hash_id:
      name: Zone hash ID
      description: >
        The 8-character hash ID of the go-zone to delete.
      required: true
      example: "wsmjco1T"
      selector:
        text:

delete_channel:
  name: Delete channel
  description: >
    Delete a channel (the path connector between two zones) from the robot's
    map using USER_CTRL_DELETE_CHANNEL.
  fields:
    channel_hash_id:
      name: Channel hash ID
      description: >
        The hash ID of the channel to delete (see the map sensor's channels
        attribute).
      required: true
      example: "ch3Kp9aQ"
      selector:
        text:

delete_nogo_zone:
  name: Delete no-go zone
  description: >
    Delete a no-go zone from the robot's map by hash ID (USER_CTRL_CLEAR_ZONE).
    Tip: back up the map first (deleting a go-zone also removes its child no-go
    zones) so you can restore from that backup if you need them back.
  fields:
    nogo_hash_id:
      name: No-go zone hash ID
      description: The hash ID of the no-go zone to delete (see the map sensor's nogo_zones).
      required: true
      example: "f518RwgE"
      selector:
        text:

start_zone:
  name: Start zone mow
  description: >
    Start mowing one or more specific zones by hash ID.
    The robot will mow only the listed zones instead of all zones.
  fields:
    zone_hash_ids:
      name: Zone hash IDs
      description: >
        List of 8-character hash IDs of the go-zones to mow.
      required: true
      example: ["wsmjco1T", "KX1kGyat"]
      selector:
        object:

pause:
  name: Pause mowing
  description: >
    Pause the robot. Sends USER_CTRL_PAUSE during a mow or USER_CTRL_PAUSE_DOCK
    while it is returning to the dock. Provided in addition to lawn_mower.pause
    so card automations (e.g. RTK auto-pause) can stay in the lymow domain.
  target:
    entity:
      integration: lymow
      domain: lawn_mower

query_map:
  name: Refresh map
  description: >
    Request a fresh map and zone list from the robot (USER_CTRL_QUERY_MAP=19).
    Useful when zone entities are stale or not yet populated.

query_schedules:
  name: Query schedules
  description: >
    Request schedule data from the robot (USER_CTRL_QUERY_SCHEDULES=20).
    Currently returns an empty result if no schedules are configured in the app.

start_video_session:
  name: Start video session
  description: >
    Request a Kinesis Video Streams WebRTC session for the robot's camera.
    Returns the channelARN, temporary AWS credentials, region, and a turnkey
    browser-viewer config — viewerWssUrl (SigV4-presigned signaling WebSocket),
    viewerClientId, and webrtcIceServers (shaped for RTCPeerConnection). The
    Lymow Camera card's Cloud mode consumes this directly; credentials expire in
    ~15 minutes. The integration itself does not pipe video bytes — a WebRTC
    viewer (the card, a browser, go2rtc, etc.) completes the handshake.

ble_drive:
  name: Manual drive (BLE)
  description: >
    Send a local Bluetooth manual-drive command to the robot. Streams the
    joystick frame for the given duration, then stops. Velocities are clamped
    to the safe range and the duration is capped at 5 s. The robot's BLE
    address is auto-discovered by name when in range; you can also set it
    explicitly in the integration options.
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    linear:
      name: Linear velocity
      description: Forward (+) / backward (-) speed in m/s.
      required: true
      example: 0.3
      selector:
        number:
          min: -0.5
          max: 0.5
          step: 0.05
          unit_of_measurement: m/s
    angular:
      name: Angular velocity
      description: Right (+) / left (-) turn rate in rad/s.
      required: true
      example: 0.0
      selector:
        number:
          min: -0.6
          max: 0.6
          step: 0.05
          unit_of_measurement: rad/s
    duration:
      name: Duration
      description: How long to drive before stopping, in seconds (max 5).
      required: false
      default: 1.0
      example: 1.0
      selector:
        number:
          min: 0.0
          max: 5.0
          step: 0.5
          unit_of_measurement: s

backup_map:
  name: Create backup map
  description: >
    Trigger the robot to create a map backup (userCtrl=44 FLOOR_BACKUP).
    The backup will appear in the backup-maps sensor after the next refresh.
  target:
    entity:
      integration: lymow
      domain: lawn_mower

restore_backup_map:
  name: Restore backup map
  description: >
    Restore a previously saved backup map onto the robot (restore-map-v2),
    then re-query the active map. The object key comes from the backup-maps
    sensor's attribute list.
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    object_key:
      name: Object key
      description: >
        S3 object key of the backup map — the `file` value from the Backup
        maps sensor's `backups` attribute.
      required: true
      example: "device_xxxx/map/map_20260514T142312Z.pb"
      selector:
        text:

delete_backup_map:
  name: Delete backup map
  description: Delete a saved backup map (delete-backup-map).
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    object_key:
      name: Object key
      description: S3 object key (the `file` value from the Backup maps sensor) to delete.
      required: true
      example: "device_xxxx/map/map_20260514T142312Z.pb"
      selector:
        text:

rename_backup_map:
  name: Rename backup map
  description: Set the display name of a saved backup map (update-backup-map-metadata).
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    object_key:
      name: Object key
      description: S3 object key (the `file` value from the Backup maps sensor) to rename.
      required: true
      example: "device_xxxx/map/map_20260514T142312Z.pb"
      selector:
        text:
    name:
      name: Name
      description: New display name for the backup map.
      required: true
      example: "Spring layout"
      selector:
        text:

set_device_name:
  name: Set device name
  description: Set the robot's cloud display name (device-update).
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    name:
      name: Name
      description: New display name for the robot.
      required: true
      example: "Garden Bot"
      selector:
        text:

set_task_config:
  name: Set mowing settings
  description: >
    Set global mowing settings (PbZoneConfig). Field numbers live-confirmed
    2026-05-30 by correlating the app's labeled Mowing Settings to the wire.
    Only the parameters you provide are sent. (Note: line_follow_mode and
    brush_speed are accepted for backward-compatibility but ignored — neither
    has a confirmed wire home.)
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    move_speed:
      name: Moving speed
      description: Mowing speed in m/s.
      example: 0.6
      selector:
        number: { min: 0.3, max: 1.0, step: 0.1, unit_of_measurement: "m/s" }
    path_spacing:
      name: Path spacing
      description: Distance between mowing passes, in cm (confirmed wire field f9).
      example: 35
      selector:
        number: { min: 25, max: 35, step: 1, unit_of_measurement: "cm" }
    perimeter_mow_laps:
      name: Zone perimeter laps
      description: Number of perimeter (edge) mowing laps per zone.
      example: 1
      selector:
        number: { min: 0, max: 3, step: 1, mode: box }
    perimeter_mow_dir:
      name: Perimeter direction
      description: Perimeter mowing direction (0/1/2 — e.g. Random/CW/CCW).
      example: 2
      selector:
        number: { min: 0, max: 2, step: 1, mode: box }
    nogo_mow_laps:
      name: No-go laps
      description: Number of laps around no-go zones.
      example: 1
      selector:
        number: { min: 0, max: 3, step: 1, mode: box }
    cut_speed:
      name: Blade speed
      description: Blade/cut speed code.
      example: 4
      selector:
        number: { min: 0, max: 10, step: 1, mode: box }
    clean_mode:
      name: Clean mode
      description: Clean-mode code.
      example: 1
      selector:
        number: { min: 0, max: 5, step: 1, mode: box }
    obs_dec_mode:
      name: Zone obstacle detection
      description: Zone obstacle-detection mode (e.g. Smart/Touch-Only).
      example: 2
      selector:
        number: { min: 0, max: 3, step: 1, mode: box }
    relative_clean_dir:
      name: Stripe angle
      description: Mowing stripe angle in degrees (wire field f16).
      example: 90
      selector:
        number: { min: 0, max: 180, step: 1, unit_of_measurement: "°" }
    path_order:
      name: Mowing order
      description: Mowing order (false = Main Area First, true = Perimeter First).
      example: false
      selector:
        boolean:
    safe_margin_mode:
      name: Safe-margin mode
      description: Edge mode — true = Offset Edge, false = Precise Edge (confirmed f17).
      example: true
      selector:
        boolean:
    turn_off_outer_motor:
      name: Turn off outer motor
      description: Turn off the outer mowing motor at boundaries (confirmed f18).
      example: false
      selector:
        boolean:
    stripe_angle:
      name: Stripe angle
      description: >
        Mowing stripe direction (confirmed f8). -1 = Optimized (robot picks the
        best direction); 0-180 = a fixed angle in degrees.
      example: 90
      selector:
        number: { min: -1, max: 180, step: 1, mode: box }
    follow_detect_mode:
      name: Perimeter obstacle detection
      description: Obstacle-detection mode on perimeter laps (Smart=2 / Touch-Only=1; confirmed f19).
      example: 2
      selector:
        number: { min: 0, max: 3, step: 1, mode: box }
    channel_detect_mode:
      name: Channel obstacle detection
      description: Obstacle-detection mode crossing a channel (Smart=2 / Touch-Only=1; globalChannelConfig f1).
      example: 2
      selector:
        number: { min: 0, max: 3, step: 1, mode: box }
    channel_deck_height:
      name: Channel deck height
      description: Deck (cut) height when crossing a channel, in mm (globalChannelConfig f2).
      example: 60
      selector:
        number: { min: 20, max: 100, step: 1, unit_of_measurement: "mm" }
    channel_raise_omni:
      name: Raise omni wheels on channel
      description: Raise the omni wheels when crossing a channel (globalChannelConfig f3).
      example: false
      selector:
        boolean:

set_device_settings:
  name: Set Device Settings
  description: >
    Write the four "Device Settings" options the app exposes (PbTaskConfig
    submessage) — two selects (Return-to-Dock route, Zone order) and two
    toggles (Rainy Mowing, Charging Handbrake). Only the parameters you
    provide are sent. Mirrors the app's Settings → Device Settings page.
    Each option is a persistent device setting — distinct from the
    per-zone cut height / path spacing parameters exposed by the
    existing lymow.set_task_config.
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    charging_mode:
      name: Return to Dock route
      description: >
        follow_perimeter = mower returns to dock along the recorded perimeter
        (safer, slower); direct_route = straight line back (faster).
      example: "follow_perimeter"
      selector:
        select:
          options:
            - "follow_perimeter"
            - "direct_route"
    zone_order:
      name: Zone order
      description: >
        optimize = app picks the best zone sequence; custom = use the order
        you defined in the app.
      example: "optimize"
      selector:
        select:
          options:
            - "optimize"
            - "custom"
    rainy_mowing:
      name: Rainy Mowing
      description: Continue mowing if the rain sensor triggers (instead of returning to dock).
      example: false
      selector:
        boolean:
    charging_handbrake:
      name: Charging Handbrake
      description: >
        Recommended for uneven ground — prevents the mower from sliding off
        the dock. UI sense (on = handbrake engaged); the wire field
        (disableChargingPark) is inverted under the hood.
      example: true
      selector:
        boolean:

set_recharge_resume:
  name: Set Recharge & Resume
  description: >
    Configure the mower's Recharge & Resume schedule and battery thresholds
    (PbRobotConfig.rrConfig). Mirrors the app's Device Settings → Recharge &
    Resume page. Only the parameters you provide are sent; the others stay
    untouched on the robot. enable=true with a period_start/period_end window
    means the mower can resume mowing during that window after a recharge.
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    enable:
      name: Enable
      description: Master on/off for Recharge & Resume.
      example: true
      selector:
        boolean:
    period_start:
      name: Resume window start (HH:MM)
      description: Earliest time of day the mower may resume mowing after a recharge.
      example: "09:00"
      selector:
        text:
    period_end:
      name: Resume window end (HH:MM)
      description: Latest time of day the mower may resume mowing.
      example: "18:00"
      selector:
        text:
    recharge_bat:
      name: Recharge battery threshold (%)
      description: Battery level at which the mower returns to the dock to recharge.
      example: 20
      selector:
        number: { min: 0, max: 100, step: 1, unit_of_measurement: "%", mode: box }
    resume_bat:
      name: Resume battery threshold (%)
      description: Battery level at which the mower resumes mowing after charging.
      example: 80
      selector:
        number: { min: 0, max: 100, step: 1, unit_of_measurement: "%", mode: box }

set_headlight_schedule:
  name: Set Headlight schedule
  description: >
    Configure the mower's Headlight Mode auto on/off window (PbRobotConfig
    f14/f15). Mirrors the app's Device Settings → Headlight Mode page. Times
    are in UTC, hour/minute (the app converts the local picker value before
    sending). enable=true requires both start and end. enable=false turns the
    schedule off; start/end are then ignored.
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    enable:
      name: Enable
      description: Master on/off for the headlight auto schedule.
      example: true
      selector:
        boolean:
    start:
      name: On time (HH:MM, UTC)
      description: Time of day the headlights turn on. Required when enable=true.
      example: "21:00"
      selector:
        text:
    end:
      name: Off time (HH:MM, UTC)
      description: Time of day the headlights turn off. Required when enable=true.
      example: "05:00"
      selector:
        text:

set_pin:
  name: Set screen PIN
  description: >
    Set the 4-digit PIN that unlocks the physical keypad on the mower's body
    (PbRobotConfig.lcdPinCode). Note: the PIN is sensitive — it is sent to the
    robot but never logged by the integration. Default from the factory is 0000.
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    pin:
      name: PIN
      description: Exactly 4 digits (0-9).
      required: true
      example: "1234"
      selector:
        text:
          type: password

set_wifi:
  name: Set Wi-Fi network
  description: >
    Provision the mower's Wi-Fi (PbInput.wifiConfig). NOTE: Wi-Fi provisioning
    is BLE-only — the robot ignores this command over the cloud/MQTT connection
    this integration uses, so the service currently raises an error (see GitHub
    issue #200). The wire format is confirmed and retained for a future BLE
    transport. The password is sensitive and is never logged by the integration.
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    ssid:
      name: SSID
      description: Wi-Fi network name.
      required: true
      example: "MyNetwork"
      selector:
        text:
    password:
      name: Password
      description: Wi-Fi password (8-63 chars, or leave empty for an open network).
      example: "wifi-password"
      selector:
        text:
          type: password


bind_rtk:
  name: Bind RTK base
  description: >
    Bind the mower to an RTK base station by its id (PbRobotConfig.rtkBind).
    The id is printed on the base and shown on the app's Bind RTK screen.
    Re-binding the current base is harmless; binding a different base changes
    the positioning reference.
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    base_id:
      name: RTK base id
      description: The RTK base station identifier (e.g. starts with "LK").
      required: true
      example: "LK000000000000"
      selector:
        text:

set_network_priority:
  name: Set network priority
  description: >
    Choose whether the mower should prefer cellular (4G) or Wi-Fi when both
    are available. Maps to PbRobotConfig.metric_4g (true = 4G preferred,
    false = Wi-Fi preferred) — the same option as the app's
    Network Settings → Network Priority screen.
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    preferred:
      name: Preferred network
      description: "4g = always use cellular when available; wifi = prefer Wi-Fi, fall back to 4G if it drops."
      required: true
      example: "wifi"
      selector:
        select:
          options:
            - "4g"
            - "wifi"

set_run_time_config:
  name: Set run-time config
  description: >
    Override run-time mow parameters on the currently-running task
    (USER_CTRL_SET_RUN_TIME_CONFIG). Unlike set_task_config (which is the
    next-mow default), this changes settings live. Only the parameters you
    provide are sent. Wire layout derived from the app.
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    cut_height:
      name: Cut height (mm)
      description: Blade height in millimetres.
      example: 40
      selector:
        number: { min: 20, max: 100, step: 1, unit_of_measurement: mm, mode: box }
    move_speed:
      name: Move speed (m/s)
      description: Forward movement speed in metres per second.
      example: 0.6
      selector:
        number: { min: 0.1, max: 1.5, step: 0.05, unit_of_measurement: "m/s", mode: box }
    cut_speed:
      name: Cut speed
      description: Blade speed (robot units).
      example: 100
      selector:
        number: { min: 0, max: 1000, step: 1, mode: box }

rename_zone:
  name: Rename zone
  description: >
    Rename a go-zone on the robot's map (USER_CTRL_MODIFY_ZONE_INFO).
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    zone_hash_id:
      name: Zone hash ID
      description: The 8-character hash ID of the go-zone to rename.
      required: true
      example: "wsmjco1T"
      selector:
        text:
    name:
      name: New name
      description: The new zone name.
      required: true
      example: "Front lawn"
      selector:
        text:

rename_nogo_zone:
  name: Rename no-go zone
  description: >
    Rename a no-go zone on the robot's map (USER_CTRL_MODIFY_ZONE_INFO,
    targets PbMap.nogoZones instead of goZones).
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    nogo_hash_id:
      name: No-go zone hash ID
      description: The 8-character hash ID of the no-go zone to rename.
      required: true
      example: "ngabcdef"
      selector:
        text:
    name:
      name: New name
      description: The new no-go zone name.
      required: true
      example: "Flower bed"
      selector:
        text:

clear_schedules:
  name: Clear schedules
  description: >
    Remove all mowing schedules from the robot (sends an empty schedule list).
  target:
    entity:
      integration: lymow
      domain: lawn_mower

set_schedules:
  name: Set schedules
  description: >
    Write the robot's full mowing schedule list. Replaces all existing
    schedules. Each entry runs at the given time; the robot mows autonomously
    when a schedule fires.
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    schedules:
      name: Schedules
      description: >
        List of schedule entries. Each entry needs hour and minute, and may set
        day_of_week (0-6 Sun-Sat, or names), zones (list of zone hash IDs to
        mow), repeated (default true), and disabled (default false).
      required: true
      example: |
        - hour: 9
          minute: 30
          day_of_week: [mon, wed, fri]
          zones: ["wsmjco1T"]
      selector:
        object:

add_schedule:
  name: Add schedule
  description: >
    Add one mowing schedule, keeping the existing ones. The robot stores the
    full list, so this re-sends every schedule plus the new entry (the existing
    ones are preserved from cached state).
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    hour:
      name: Hour
      description: Local hour (0-23) the mow should start.
      required: true
      example: 9
      selector:
        number: { min: 0, max: 23, step: 1, mode: box }
    minute:
      name: Minute
      description: Local minute (0-59).
      required: true
      example: 30
      selector:
        number: { min: 0, max: 59, step: 1, mode: box }
    day_of_week:
      name: Days
      description: Days to run (0-6 Sun-Sat, or names). Empty = every day.
      example: [mon, wed, fri]
      selector:
        object:
    zones:
      name: Zones
      description: List of go-zone hash IDs to mow.
      example: ["wsmjco1T"]
      selector:
        object:
    repeated:
      name: Repeat weekly
      description: Whether the schedule repeats every week (default true).
      example: true
      selector:
        boolean:
    disabled:
      name: Start disabled
      description: Create the schedule in the disabled state (default false).
      example: false
      selector:
        boolean:

delete_schedule:
  name: Delete schedule
  description: >
    Delete one mowing schedule by its id (re-sends the remaining list). The id
    is the value exposed in the Mow schedules sensor's attributes.
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    id:
      name: Schedule id
      description: The id of the schedule to delete (from the schedules sensor).
      required: true
      example: 481098222
      selector:
        number: { min: 0, mode: box }

toggle_schedule:
  name: Enable/disable schedule
  description: >
    Enable or disable one mowing schedule by its id without deleting it
    (re-sends the full list with that entry's disabled flag changed).
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    id:
      name: Schedule id
      description: The id of the schedule to toggle (from the schedules sensor).
      required: true
      example: 481098222
      selector:
        number: { min: 0, mode: box }
    disabled:
      name: Disabled
      description: true = disable the schedule, false = enable it.
      required: true
      example: true
      selector:
        boolean:

update_zone_polygon:
  name: Update zone polygon
  description: >
    Replace a go-zone's outline with a new polygon (USER_CTRL_SYNC_MAP). Points
    are in the robot's local ENU frame (metres). Used by the map card's editor.
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    zone_hash_id:
      name: Zone hash ID
      description: The 8-character hash ID of the go-zone to reshape.
      required: true
      example: "wsmjco1T"
      selector:
        text:
    polygon:
      name: Polygon
      description: >
        Ordered list of at least 3 vertices, each an {x, y} point in metres
        (local ENU frame).
      required: true
      example: [{ x: 0.0, y: 0.0 }, { x: 5.0, y: 0.0 }, { x: 5.0, y: 4.0 }]
      selector:
        object:

get_clean_history:
  name: Get cleaning history
  description: >
    Return the paged cleaning-history list (most-recent first) as a response
    object. Each entry has clean_area, clean_time, date (epoch seconds),
    error_list, map_total_area, percent, soc_version, start_type,
    status_times, used_battery, history_file, hash_id. The HA sensors only
    surface the latest entry — use this service when automations need the
    full list (e.g. "alert me if the last 3 mows failed").
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    page:
      name: Page (0-based)
      description: Pagination index (0 = most-recent page).
      required: false
      default: 0
      example: 0
      selector:
        number: { min: 0, max: 100, step: 1, mode: box }
    page_size:
      name: Page size
      description: Number of entries to return per page.
      required: false
      default: 15
      example: 15
      selector:
        number: { min: 1, max: 100, step: 1, mode: box }

update_channel_settings:
  name: Update channel settings
  description: >
    Override mowing settings for one channel (cut height, channel lift) and
    resync the map. Channels carry their settings directly on the PbChannel
    record — no configBox sub-message — so only ``cut_height_mm`` and
    ``channel_lift`` are exposed here. Resync is via sync_map (userCtrl=25).
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    channel_hash_id:
      name: Channel hash ID
      description: The 8-character hash ID of the channel to update.
      required: true
      example: "ch000001"
      selector:
        text:
    cut_height_mm:
      name: Cut height (mm)
      description: Blade height while the robot traverses this channel.
      required: false
      example: 40
      selector:
        number: { min: 20, max: 100, step: 5, unit_of_measurement: "mm" }
    channel_lift:
      name: Channel lift mode
      description: >
        Raise the omni-wheels on this channel? Per the app's Channel Deck
        Height setting. 0=auto, 1=off, 2=on (values inferred from the wire
        capture; refine after live correlation).
      required: false
      example: 0
      selector:
        number: { min: 0, max: 2, step: 1, mode: box }

set_geofence:
  name: Set anti-theft geofence
  description: >
    Set one anti-theft geofence region's centre, radius, and optional name in
    one PATCH /update-device-feature call. Mirrors the Lymow app's Settings →
    Anti-theft page (centre + radius slider + Save). The app supports multiple
    regions navigated by `< >` arrows — pass `index` to pick which one. Each
    parameter is optional; omitted ones keep their existing value, so the same
    service can move the centre, resize the circle, or rename it independently.
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    latitude:
      name: Centre latitude
      description: WGS-84 latitude of the geofence centre.
      required: false
      example: 51.5
      selector:
        number: { min: -90, max: 90, step: 0.000001, mode: box }
    longitude:
      name: Centre longitude
      description: WGS-84 longitude of the geofence centre.
      required: false
      example: -0.12
      selector:
        number: { min: -180, max: 180, step: 0.000001, mode: box }
    radius_m:
      name: Radius (m)
      description: Geofence radius in metres (10–500).
      required: false
      example: 150
      selector:
        number: { min: 10, max: 500, step: 5, unit_of_measurement: "m" }
    name:
      name: Name
      description: Optional display name for the geofence.
      required: false
      example: "Backyard"
      selector:
        text:
    index:
      name: Region index
      description: >
        Which geofence region to mutate (0 = first; defaults to 0). Pass an
        index equal to the current region count to append a new region.
      required: false
      example: 0
      selector:
        number: { min: 0, max: 9, step: 1, mode: box }

set_zone_config:
  name: Set per-zone mowing config
  description: >
    Override mowing settings for a single zone (USER_CTRL_MODIFY_ZONE_INFO with
    a per-zone PbZoneConfig — the app's Mowing Settings → Customize tab path).
    Only the parameters you provide are sent. Bandwidth-efficient alternative
    to lymow.update_zone_cut_height (which re-sends the whole map). Cut height
    is millimetres; move speed is m/s; other values are robot units. Wire
    format byte-equal to the app's BLE write (live capture 2026-05-27).
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    zone_hash_id:
      name: Zone hash ID
      description: The 8-character hash ID of the go-zone to update.
      required: true
      example: "wsmjco1T"
      selector:
        text:
    is_enabled:
      name: Is enabled
      description: Optional — set the zone's enabled flag in the same write.
      required: false
      example: true
      selector:
        boolean:
    cut_height:
      name: Cut height (mm)
      description: Blade height for this zone (20–100 mm).
      required: false
      example: 40
      selector:
        number: { min: 20, max: 100, step: 5, unit_of_measurement: "mm" }
    move_speed:
      name: Move speed (m/s)
      description: Robot drive speed within this zone.
      required: false
      example: 0.6
      selector:
        number: { min: 0.1, max: 1.5, step: 0.05 }
    path_spacing:
      name: Path spacing
      description: Spacing between mowing passes (robot units).
      required: false
      example: 25
      selector:
        number: { min: 0, max: 1000, step: 1, mode: box }
    perimeter_mow_laps:
      name: Perimeter laps
      description: Number of perimeter (edge) mowing laps for this zone.
      required: false
      example: 1
      selector:
        number: { min: 0, max: 5, step: 1, mode: box }
    perimeter_mow_dir:
      name: Perimeter direction
      description: Perimeter mowing direction code.
      required: false
      example: 0
      selector:
        number: { min: 0, max: 3, step: 1, mode: box }
    nogo_mow_laps:
      name: No-go laps
      description: Number of laps around no-go zones inside this zone.
      required: false
      example: 1
      selector:
        number: { min: 0, max: 5, step: 1, mode: box }
    cut_speed:
      name: Cut speed
      description: Cutting blade speed (robot units).
      required: false
      example: 100
      selector:
        number: { min: 0, max: 1000, step: 1, mode: box }
    brush_speed:
      name: Brush speed
      description: Brush motor speed (robot units).
      required: false
      example: 100
      selector:
        number: { min: 0, max: 1000, step: 1, mode: box }
    obs_dec_mode:
      name: Obstacle detection mode
      description: 0=off, 1=slow, 2=detour.
      required: false
      example: 2
      selector:
        number: { min: 0, max: 2, step: 1, mode: box }
    clean_mode:
      name: Clean mode
      description: 0=parallel, 1=spiral, 2=random (robot interprets).
      required: false
      example: 0
      selector:
        number: { min: 0, max: 3, step: 1, mode: box }
    path_order:
      name: Path order (reverse)
      description: false = normal, true = reverse path direction.
      required: false
      example: false
      selector:
        boolean:
    line_follow_mode:
      name: Line follow mode
      description: When true, edges follow the boundary line precisely.
      required: false
      example: false
      selector:
        boolean:
    raise_cut_height:
      name: Raise cut height (trigger)
      description: Pulse trigger to raise the cut height incrementally.
      required: false
      example: false
      selector:
        boolean:
    lower_cut_height:
      name: Lower cut height (trigger)
      description: Pulse trigger to lower the cut height incrementally.
      required: false
      example: false
      selector:
        boolean:

update_zone_cut_height:
  name: Update zone cut height
  description: >
    Change one go-zone's cut height (mm) and push the updated map back to the
    robot (USER_CTRL_SYNC_MAP). Other zones, polygons, and global settings are
    left untouched.
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    zone_hash_id:
      name: Zone hash ID
      description: The 8-character hash ID of the go-zone whose cut height to change.
      required: true
      example: "wsmjco1T"
      selector:
        text:
    cut_height_mm:
      name: Cut height (mm)
      description: Blade height in millimetres (20–100).
      required: true
      example: 40
      selector:
        number:
          min: 20
          max: 100
          step: 5
          unit_of_measurement: "mm"

add_zone:
  name: Add zone
  description: >
    Create a new go-zone from a polygon and push it to the robot's map
    (USER_CTRL_SYNC_MAP). Points are in the robot's local ENU frame (metres).
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    polygon:
      name: Polygon
      description: Ordered list of at least 3 {x, y} vertices in metres (local ENU frame).
      required: true
      example: [{ x: 0.0, y: 0.0 }, { x: 5.0, y: 0.0 }, { x: 5.0, y: 4.0 }]
      selector:
        object:
    name:
      name: Name
      description: Optional display name for the new zone.
      required: false
      example: "Side strip"
      selector:
        text:
    cut_height_mm:
      name: Cut height
      description: Cutting height for the zone, in millimetres.
      required: false
      default: 40
      example: 40
      selector:
        number: { min: 20, max: 100, step: 1, unit_of_measurement: mm, mode: box }

merge_zones:
  name: Merge zones
  description: >
    Merge two or more adjacent go-zones into one (USER_CTRL_MERGE_ZONE).
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    zone_hash_ids:
      name: Zone hash IDs
      description: List of at least two go-zone hash IDs to merge.
      required: true
      example: ["wsmjco1T", "KX1kGyat"]
      selector:
        object:
    name:
      name: Name
      description: Optional display name for the merged zone.
      required: false
      example: "Whole lawn"
      selector:
        text:
    cut_height_mm:
      name: Cut height
      description: Optional cutting height for the merged zone, in millimetres.
      required: false
      example: 40
      selector:
        number: { min: 20, max: 100, step: 1, unit_of_measurement: mm, mode: box }

split_zone:
  name: Split zone
  description: >
    Split a go-zone into two along the line between two points
    (USER_CTRL_CUT_ZONE). Points are in the robot's local ENU frame (metres).
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    zone_hash_id:
      name: Zone hash ID
      description: The hash ID of the go-zone to split.
      required: true
      example: "wsmjco1T"
      selector:
        text:
    cut_p1:
      name: Cut line point 1
      description: First endpoint of the split line, as {x, y} in metres.
      required: true
      example: { x: 2.5, y: 0.0 }
      selector:
        object:
    cut_p2:
      name: Cut line point 2
      description: Second endpoint of the split line, as {x, y} in metres.
      required: true
      example: { x: 2.5, y: 4.0 }
      selector:
        object:
    names:
      name: Names
      description: Optional two display names for the resulting zones.
      required: false
      example: ["Left", "Right"]
      selector:
        object:

pin_and_go:
  name: Pin and go
  description: >
    Drop a temporary spot-mow zone of the given radius around a map point and
    start mowing it. Coordinates are in the robot's local ENU frame (metres).
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    x:
      name: X
      description: X coordinate of the point in metres (local ENU frame).
      required: true
      example: 3.5
      selector:
        number: { min: -1000, max: 1000, step: 0.1, mode: box }
    y:
      name: Y
      description: Y coordinate of the point in metres (local ENU frame).
      required: true
      example: -2.0
      selector:
        number: { min: -1000, max: 1000, step: 0.1, mode: box }
    radius_m:
      name: Radius
      description: Radius of the spot-mow circle, in metres.
      required: false
      default: 1.0
      example: 1.0
      selector:
        number: { min: 0.1, max: 20.0, step: 0.1, unit_of_measurement: m, mode: box }
    cut_height_mm:
      name: Cut height
      description: Cutting height for the spot zone, in millimetres.
      required: false
      default: 40
      example: 40
      selector:
        number: { min: 20, max: 100, step: 1, unit_of_measurement: mm, mode: box }
    name:
      name: Name
      description: Optional display name for the spot zone.
      required: false
      example: "Spot"
      selector:
        text:

rename_channel:
  name: Rename channel
  description: >
    Assign a display name to a channel. Channel names have no protobuf field on
    the robot, so the name is stored HA-side and re-applied on each map update.
    The map card also persists names in localStorage for browser-side continuity.
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    channel_hash_id:
      name: Channel hash ID
      description: The 8-character hash ID of the channel to rename.
      required: true
      example: "a1b2c3d4"
      selector:
        text:
    name:
      name: New name
      description: The display name for the channel.
      required: true
      example: "Back passage"
      selector:
        text:

add_nogo_zone:
  name: Add no-go zone
  description: >
    Create a new no-go zone from a polygon and push it to the robot's map
    (USER_CTRL_SYNC_MAP). Points are in the robot's local ENU frame (metres).
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    polygon:
      name: Polygon
      description: Ordered list of at least 3 {x, y} vertices in metres (local ENU frame).
      required: true
      example: [{ x: 1.0, y: 1.0 }, { x: 3.0, y: 1.0 }, { x: 3.0, y: 3.0 }]
      selector:
        object:
    parent_zone_hash_id:
      name: Parent zone hash ID
      description: Hash ID of the go-zone this no-go zone belongs to. Empty string for top-level.
      required: false
      default: ""
      example: "wsmjco1T"
      selector:
        text:

add_channel:
  name: Add channel
  description: >
    Create a new mowing channel connecting two zones and push it to the robot's
    map (USER_CTRL_SYNC_MAP). The channel is defined by at least 2 path points in
    the robot's local ENU frame (metres).
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    polygon:
      name: Path points
      description: Ordered list of at least 2 {x, y} points in metres (local ENU frame).
      required: true
      example: [{ x: 0.0, y: 5.0 }, { x: 10.0, y: 5.0 }]
      selector:
        object:
    zone1_hash_id:
      name: Zone 1 hash ID
      description: Hash ID of the first zone the channel connects. Empty string if not connected.
      required: false
      default: ""
      example: "wsmjco1T"
      selector:
        text:
    zone2_hash_id:
      name: Zone 2 hash ID
      description: Hash ID of the second zone the channel connects. Empty string if not connected.
      required: false
      default: ""
      example: "KX1kGyat"
      selector:
        text:
    cut_height_mm:
      name: Cut height
      description: Cutting height for the channel, in millimetres.
      required: false
      default: 40
      example: 40
      selector:
        number: { min: 20, max: 100, step: 1, unit_of_measurement: mm, mode: box }

update_nogo_polygon:
  name: Update no-go zone polygon
  description: >
    Replace a no-go zone's outline with a new polygon (USER_CTRL_SYNC_MAP). Points
    are in the robot's local ENU frame (metres). Used by the map card's editor.
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    nogo_hash_id:
      name: No-go zone hash ID
      description: The 8-character hash ID of the no-go zone to reshape.
      required: true
      example: "ngabcdef"
      selector:
        text:
    polygon:
      name: Polygon
      description: Ordered list of at least 3 {x, y} vertices in metres (local ENU frame).
      required: true
      example: [{ x: 1.0, y: 1.0 }, { x: 3.0, y: 1.0 }, { x: 3.0, y: 3.0 }]
      selector:
        object:

set_zone_enabled:
  name: Enable/disable zone
  description: >
    Enable or disable a go-zone. Disabled zones are skipped during autonomous
    mowing but remain on the map (USER_CTRL_SYNC_MAP).
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    zone_hash_id:
      name: Zone hash ID
      description: The 8-character hash ID of the go-zone to enable or disable.
      required: true
      example: "wsmjco1T"
      selector:
        text:
    is_enabled:
      name: Enabled
      description: Set to true to enable the zone, false to disable it.
      required: true
      example: true
      selector:
        boolean:

move_charging_station:
  name: Move charging station
  description: >
    Relocate the charging station marker on the robot's map. Coordinates are in
    the robot's local ENU frame (metres). Called by the map card's drag-to-relocate
    feature (USER_CTRL_MOVE_CHARGING_STATION).
  target:
    entity:
      integration: lymow
      domain: lawn_mower
  fields:
    x:
      name: X
      description: New X coordinate in metres (local ENU frame).
      required: true
      example: 0.5
      selector:
        number: { min: -1000, max: 1000, step: 0.01, mode: box }
    y:
      name: Y
      description: New Y coordinate in metres (local ENU frame).
      required: true
      example: 1.2
      selector:
        number: { min: -1000, max: 1000, step: 0.01, mode: box }
    theta:
      name: Heading (radians)
      description: Optional orientation of the station in radians (0 = East).
      required: false
      example: 0.0
      selector:
        number: { min: -3.14159, max: 3.14159, step: 0.01, mode: box }

resume:
  name: Resume mowing
  description: >
    Resume a paused or in-flight mow without restarting it. HA's standard
    "start mowing" service starts a fresh task (USER_CTRL_CLEAN); this sends
    USER_CTRL_RESUME so the robot picks up from where it was — useful after a
    pause or after telling it to dock mid-mow.
  target:
    entity:
      integration: lymow
      domain: lawn_mower

query_cleaning_info:
  name: Query current cleaning info
  description: >
    Request the robot's per-session cleaning info (USER_CTRL_QUERY_CLEANING_INFO=24).
    The reply populates the live PbCleanInfo sensors (Mow time remaining, Total
    map area, etc.). Fire-and-forget — values arrive via the next pboutput.
  target:
    entity:
      integration: lymow
      domain: lawn_mower

query_cleaning_summary:
  name: Query last cleaning summary
  description: >
    Request the last session's summary (USER_CTRL_QUERY_CLEANING_SUMMARY=34).
    Populates sensor.last_mow_session (start time, end-type, battery used,
    per-status time breakdown).
  target:
    entity:
      integration: lymow
      domain: lawn_mower

query_robot_config:
  name: Query robot configuration
  description: >
    Request a full PbRobotConfig readback (USER_CTRL_QUERY_ROBOT_CONFIG=35).
    Refreshes the cached robotConfig dict (audio volume, LED state,
    Recharge & Resume thresholds, etc.).
  target:
    entity:
      integration: lymow
      domain: lawn_mower

query_path:
  name: Query historical path
  description: >
    Request the robot's historical mowing path (USER_CTRL_QUERY_PATH=23).
    Decode not yet implemented — payload is logged for future analysis.
  target:
    entity:
      integration: lymow
      domain: lawn_mower

query_channels:
  name: Query channels
  description: >
    Request the channel (corridor between zones) list (USER_CTRL_QUERY_CHANNELS=39).
    Refreshes mapData.channels with the current channel polygons.
  target:
    entity:
      integration: lymow
      domain: lawn_mower

query_run_time_config:
  name: Query live runtime config
  description: >
    Request the live PbRunTimeConfig (USER_CTRL_QUERY_RUN_TIME_CONFIG=51) —
    the in-flight cut height / move speed / cut speed overrides. Reply decode
    is not yet implemented; this is a fire-and-forget probe.
  target:
    entity:
      integration: lymow
      domain: lawn_mower

query_wifi_4g:
  name: Query Wi-Fi / 4G status
  description: >
    Request the Wi-Fi / 4G status (USER_CTRL_QUERY_WIFI_4G=52). Reply decode
    is not yet implemented (SSID / SIM data needs PII redaction first).
  target:
    entity:
      integration: lymow
      domain: lawn_mower

query_net_detail:
  name: Query network details
  description: >
    Request detailed network info (USER_CTRL_QUERY_NET_DETAIL=53). Reply decode
    is not yet implemented; see query_wifi_4g notes.
  target:
    entity:
      integration: lymow
      domain: lawn_mower

query_rtk_diagnostic_l1:
  name: Query RTK diagnostic L1
  description: >
    Request RTK level-1 diagnostic (USER_CTRL_QUERY_RTK_DIAGNOSTIC_L1=57).
    Reply decode is not yet implemented; raw bytes are logged.
  target:
    entity:
      integration: lymow
      domain: lawn_mower

query_rtk_diagnostic_l2:
  name: Query RTK diagnostic L2
  description: >
    Request RTK level-2 diagnostic (USER_CTRL_QUERY_RTK_DIAGNOSTIC_L2=58).
    Reply decode is not yet implemented; raw bytes are logged.
  target:
    entity:
      integration: lymow
      domain: lawn_mower
